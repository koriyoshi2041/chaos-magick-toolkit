<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#12061e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="star-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="50%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#9b59b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="outer-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg)"/>

  <!-- Subtle radial glow behind star -->
  <circle cx="400" cy="130" r="120" fill="url(#glow)"/>

  <!-- 8-pointed Chaosphere Star -->
  <g transform="translate(400, 130)">
    <!-- Outer glow layer -->
    <g filter="url(#outer-glow)" opacity="0.5">
      <!-- 8 arrows -->
      <line x1="0" y1="-75" x2="0" y2="-55" stroke="#9b59b6" stroke-width="3"/>
      <line x1="53" y1="-53" x2="39" y2="-39" stroke="#9b59b6" stroke-width="3"/>
      <line x1="75" y1="0" x2="55" y2="0" stroke="#9b59b6" stroke-width="3"/>
      <line x1="53" y1="53" x2="39" y2="39" stroke="#9b59b6" stroke-width="3"/>
      <line x1="0" y1="75" x2="0" y2="55" stroke="#9b59b6" stroke-width="3"/>
      <line x1="-53" y1="53" x2="-39" y2="39" stroke="#9b59b6" stroke-width="3"/>
      <line x1="-75" y1="0" x2="-55" y2="0" stroke="#9b59b6" stroke-width="3"/>
      <line x1="-53" y1="-53" x2="-39" y2="-39" stroke="#9b59b6" stroke-width="3"/>
    </g>

    <!-- Arrow lines with arrowheads -->
    <!-- North -->
    <line x1="0" y1="-72" x2="0" y2="-20" stroke="url(#star-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="0,-78 -5,-66 5,-66" fill="#c0392b"/>
    <!-- NE -->
    <line x1="51" y1="-51" x2="14" y2="-14" stroke="url(#star-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="55,-55 42,-51 51,-42" fill="#c0392b"/>
    <!-- East -->
    <line x1="72" y1="0" x2="20" y2="0" stroke="url(#star-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="78,0 66,-5 66,5" fill="#c0392b"/>
    <!-- SE -->
    <line x1="51" y1="51" x2="14" y2="14" stroke="url(#star-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="55,55 42,51 51,42" fill="#c0392b"/>
    <!-- South -->
    <line x1="0" y1="72" x2="0" y2="20" stroke="url(#star-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="0,78 -5,66 5,66" fill="#c0392b"/>
    <!-- SW -->
    <line x1="-51" y1="51" x2="-14" y2="14" stroke="url(#star-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-55,55 -42,51 -51,42" fill="#c0392b"/>
    <!-- West -->
    <line x1="-72" y1="0" x2="-20" y2="0" stroke="url(#star-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-78,0 -66,-5 -66,5" fill="#c0392b"/>
    <!-- NW -->
    <line x1="-51" y1="-51" x2="-14" y2="-14" stroke="url(#star-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-55,-55 -42,-51 -51,-42" fill="#c0392b"/>

    <!-- Central circle -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#9b59b6" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#e8e8e8"/>
  </g>

  <!-- Title -->
  <text x="400" y="240" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="36" font-weight="bold" letter-spacing="12" fill="#e8e8e8">CHAOS MAGICK</text>

  <!-- Subtitle -->
  <text x="400" y="268" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="14" letter-spacing="6" fill="#9b59b6" opacity="0.8">PRACTICE TOOLKIT</text>

  <!-- Bottom quote -->
  <text x="400" y="300" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="11" font-style="italic" fill="#666" letter-spacing="1">"Nothing is true, everything is permitted."</text>

  <!-- Decorative side lines -->
  <line x1="120" y1="280" x2="300" y2="280" stroke="#9b59b6" stroke-width="0.5" opacity="0.3"/>
  <line x1="500" y1="280" x2="680" y2="280" stroke="#9b59b6" stroke-width="0.5" opacity="0.3"/>

  <!-- Small decorative symbols -->
  <text x="310" y="284" text-anchor="middle" font-size="10" fill="#9b59b6" opacity="0.5">⛧</text>
  <text x="490" y="284" text-anchor="middle" font-size="10" fill="#9b59b6" opacity="0.5">⛧</text>
</svg>